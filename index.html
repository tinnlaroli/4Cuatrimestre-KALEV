<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALEV - Login y Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style-login.css">
    <link rel="stylesheet" href="css/style-animations.css">
</head>
<body>
    <div class="container">
        <img id="logo" src="src/kalev-name.png" alt="KALEV Logo" class="img-fluid">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Login Form -->
                <div id="loginForm" class="content-section visible">
                    <h2 class="text-center mb-4">Iniciar Sesión</h2>
                    <form id="loginFormSubmit">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
                    </form>
                    <p class="text-center mt-3">¿No tienes cuenta? <a href="#" id="goToRegister">Registrarse</a></p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="content-section">
                    <h2 class="text-center mb-4">Registro</h2>
                    <form id="registerFormSubmit">
                        <div class="mb-3">
                            <label for="registerName" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="registerName" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Registrarse</button>
                    </form>
                    <p class="text-center mt-3">¿Ya tienes cuenta? <a href="#" id="goToLogin">Iniciar sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Importar scripts al final -->
    <script src="js/api.js" type="module"></script>  
    <script src="js/app.js" type="module"></script>
    <script src="js/animations.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
